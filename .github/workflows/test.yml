name: Go tests
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    name: Test on Debian Latest
    strategy:
      fail-fast: false
      matrix:
        go: [1.24.x]
        os: [debian-latest] # <-- ИЗМЕНЕНИЕ: используем Debian
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Диагностика
      - name: Diagnose Environment
        run: |
          echo "--- OS Version ---"
          cat /etc/os-release
          echo
          echo "--- Kernel Version ---"
          uname -a

      # Запускаем тесты с ожиданием падения
      - name: Run tests (expecting failure on original test)
        run: |
          # Используем временный тестовый файл для анализа
          cat <<'EOF' > internal/keyring/keyring_test.go
          package keyring

          import (
          	"errors"
          	"syscall"
          	"testing"
          )
          
          func TestNoKeyOriginal(t *testing.T) {
          	t.Log("--- Running Original Test (expecting failure on this kernel) ---")
          	keyring, err := SessionKeyring.CreateKeyring()
          	if err != nil {
          		t.Fatalf("failed getting keyring: %v", err)
          	}
          	_, err = keyring.ReadKey("this.key.does.not.exist")
          	if !errors.Is(err, syscall.ENOKEY) {
          		// Эта ветка должна сработать, если гипотеза верна
          		t.Fatalf("TEST FAILED AS EXPECTED: err is '%v', not syscall.ENOKEY", err)
          	}
          }

          func TestKeyNotFoundBehaviorAnalysis(t *testing.T) {
                  t.Log("--- Starting Behavior Analysis ---")
                  keyring, err := SessionKeyring.CreateKeyring()
                  if err != nil { t.Fatalf("Failed to create keyring: %v", err) }
                  keyName := "this.key.is.for.analysis.only"
                  _, err1 := keyring.ReadKey(keyName)
                  if err1 != nil {
                          t.Logf("First Attempt Error: %v (%T)", err1, err1)
                          t.Logf("Is ENOENT: %v", errors.Is(err1, syscall.ENOENT))
                          t.Logf("Is ENOKEY: %v", errors.Is(err1, syscall.ENOKEY))
                  }
                  _, err2 := keyring.ReadKey(keyName)
                  if err2 != nil {
                          t.Logf("Second Attempt Error: %v (%T)", err2, err2)
                          t.Logf("Is ENOENT: %v", errors.Is(err2, syscall.ENOENT))
                          t.Logf("Is ENOKEY: %v", errors.Is(err2, syscall.ENOKEY))
                  }
          }
          EOF
          # Запускаем тесты. Используем '|| true', чтобы шаг не завершился ошибкой.
          go test ./internal/... -v || true
      
      - name: Run go vet
        run: go vet ./...
      
      - name: staticcheck
        uses: dominikh/staticcheck-action@v1.3.1
        with:
          install-go: false
          
